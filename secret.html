<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Your Eyes Only</title>
    <link rel="stylesheet" href="css/secret.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="left-side" id="contentLeft">
            <img src="IMAGEN/cat03.gif" alt="Cute Cat" class="cat-img" id="displayImage" />
            <h1 id="mainTitle">For your eyes only</h1>
            <p id="subTitle">Enter our month-sary to continue</p>
        </div>

        <div class="right-side" id="contentRight">
            
            <div id="keypadView">
                <div class="dots-container">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>

                <div class="keypad">
                    <button class="key" onclick="pressKey('1')">1</button>
                    <button class="key" onclick="pressKey('2')">2</button>
                    <button class="key" onclick="pressKey('3')">3</button>
                    <button class="key" onclick="pressKey('4')">4</button>
                    <button class="key" onclick="pressKey('5')">5</button>
                    <button class="key" onclick="pressKey('6')">6</button>
                    <button class="key" onclick="pressKey('7')">7</button>
                    <button class="key" onclick="pressKey('8')">8</button>
                    <button class="key" onclick="pressKey('9')">9</button>
                    <button class="key zero" onclick="pressKey('0')">0</button>
                    <button class="key delete" onclick="deleteKey()">⌫</button>
                </div>
            </div>

            <div id="messageBoard" style="display:none; text-align: center; color: #333; width: 90%;">
    <h2>Nuestro Buzón 💌</h2>
    <div id="history" style="height: 150px; overflow-y: auto; background: rgba(255,255,255,0.6); margin: 10px; padding: 10px; border-radius: 10px; text-align: left;"></div>
    <input type="text" id="msgInput" placeholder="Escribe algo lindo..." style="padding: 8px; width: 70%; border-radius: 5px; border: 1px solid #ccc;">
    <button onclick="saveMessage()">Enviar</button>
    
    <br><br>
    <button onclick="resetApp()" style="background: none; border: 1px solid #91435d; color: #91435d; padding: 5px 15px; border-radius: 15px; cursor: pointer;">
        ← Salir del buzón
    </button>
</div>

            <div class="error-message" id="errorView" style="display: none;">
                <p style="color: #d63384; font-weight: bold;">Contraseña incorrecta, ¿estás seguro de que eres mi bebé?</p>
                <button class="try-again" onclick="resetApp()">Intentar de nuevo</button>
            </div>
            
        </div>
    </div>

    <script src="js/secret.js"></script>
</body>
</html>
