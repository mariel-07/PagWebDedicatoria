<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Your Eyes Only</title>
     <link rel="stylesheet" href="css/secret.css">
  </head>
  <body>
    <div class="container" id="mainContainer">
      <div class="left-side" id="contentLeft">
        <img src="IMAGEN/cat03.gif" alt="Cute Cat" class="cat-img" id="displayImage" />
        <h1 id="mainTitle">For your eyes only</h1>
        <p id="subTitle">Enter our month-sary to continue</p>
      </div>

      <div class="right-side" id="contentRight">
        <div id="keypadView">
          <div class="dots-container">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot image_f3a161.png"></div>
            <div class="dot"></div>
          </div>

          <div class="keypad">
            <button class="key" onclick="pressKey('1')">1</button>
            <button class="key" onclick="pressKey('2')">2</button>
            <button class="key" onclick="pressKey('3')">3</button>
            <button class="key" onclick="pressKey('4')">4</button>
            <button class="key" onclick="pressKey('5')">5</button>
            <button class="key" onclick="pressKey('6')">6</button>
            <button class="key" onclick="pressKey('7')">7</button>
            <button class="key" onclick="pressKey('8')">8</button>
            <button class="key" onclick="pressKey('9')">9</button>
            <button class="key zero" onclick="pressKey('0')">0</button>
          </div>
        </div>

        <div class="error-message" id="errorView">
          <button class="try-again" onclick="resetApp()">Regresar</button>
        </div>
      </div>
    </div>

    <script src="js/secret.js"></script>
  </body>
</html>
